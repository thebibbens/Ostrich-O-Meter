];

function getLabel(pct) { return LABELS.find(l => pct <= l.max) || LABELS[LABELS.length - 1]; }
function genCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function getEpitaph(name) {
  // Deterministic per name so it's stable per session but feels random
  const idx = name.split("").reduce((a, c) => a + c.charCodeAt(0), 0) % EPITAPHS.length;
  return EPITAPHS[idx];
}

// ── OSTRICH GROUP (renders directly into any SVG, no foreignObject) ──
function OstrichGroup({ pct, feather, eyeColor, accessories = [], legStyle, size, ox, oy }) {
  const sc = size;
  const pct100 = Math.min(pct, 100);
  const pctOver = Math.max(0, pct - 100);
  const buried100 = pct100 / 100;
  const buriedBody = pctOver / 100;

  if (pct >= 200) {
    // Tombstone — oy is the ground level, stone sits above it
    return (
      <g transform={`translate(${ox - 60},${oy - 140})`}>
        <ellipse cx={60} cy={145} rx={40} ry={10} fill="#a07840" opacity="0.5"/>
        <ellipse cx={60} cy={142} rx={36} ry={8} fill="#b8945e" opacity="0.6"/>
        <rect x={34} y={55} width={52} height={78} rx={5} fill="#8a8a8a"/>
        <ellipse cx={60} cy={55} rx={26} ry={18} fill="#8a8a8a"/>
        <rect x={37} y={57} width={46} height={74} rx={3} fill="#b0b0b0"/>
        <ellipse cx={60} cy={55} rx={23} ry={15} fill="#b0b0b0"/>
        <ellipse cx={48} cy={48} rx={6} ry={4} fill="#c8c8c8" opacity="0.4"/>
        <rect x={56} y={68} width={8} height={28} rx={2} fill="#707070"/>
        <rect x={48} y={76} width={24} height={7} rx={2} fill="#707070"/>
        <text x={60} y={115} textAnchor="middle" fontSize={16} fontWeight="bold" fill="#505050">RIP</text>
      </g>
    );
  }

  const groundY = 170 * sc;
  const bx = 58*sc, by = 120*sc, brx = 34*sc, bry = 30*sc;
  const bodySink = buriedBody * 40 * sc;
  const neckBaseX = bx - 10*sc;
  const neckBaseY = by - bry + 4*sc + bodySink;
  const neckLen = 60*sc;
  const angleStart = -80*(Math.PI/180), angleEnd = -200*(Math.PI/180);
  const neckAngle = angleStart + buried100*(angleEnd - angleStart);
  const neckTipX = neckBaseX + Math.cos(neckAngle)*neckLen;
  const neckTipY = neckBaseY + Math.sin(neckAngle)*neckLen;
  const headR = 16*sc;
  const headX = neckTipX + Math.cos(neckAngle)*headR*0.5;
  const headY = neckTipY + Math.sin(neckAngle)*headR*0.5;
  const headBuried = headY + headR*0.5 > groundY || pct100 >= 100;
  const neckW = 9*sc, perp = neckAngle + Math.PI/2;
  const nx1=neckBaseX+Math.cos(perp)*neckW, ny1=neckBaseY+Math.sin(perp)*neckW;
  const nx2=neckBaseX-Math.cos(perp)*neckW, ny2=neckBaseY-Math.sin(perp)*neckW;
  const nx3=neckTipX-Math.cos(perp)*(neckW*0.7), ny3=neckTipY-Math.sin(perp)*(neckW*0.7);
  const nx4=neckTipX+Math.cos(perp)*(neckW*0.7), ny4=neckTipY+Math.sin(perp)*(neckW*0.7);
  const patchX=neckBaseX+Math.cos(neckAngle)*10*sc, patchY=neckBaseY+Math.sin(neckAngle)*10*sc;
  const ndy=Math.sin(neckAngle);
  const faceDx=ndy, faceDy=-Math.cos(neckAngle);
  const headUpX=0, headUpY=-1;
  const eyeX=headX+faceDx*headR*0.3+headUpX*headR*0.35;
  const eyeY=headY+faceDy*headR*0.3+headUpY*headR*0.35;
  const lashAngle=Math.atan2(headUpY,headUpX);
  const beakBaseX=headX+faceDx*headR*0.85, beakBaseY=headY+faceDy*headR*0.85;
  const beakLen=15*sc;
  const beakTipX=beakBaseX+faceDx*beakLen, beakTipY=beakBaseY+faceDy*beakLen;
  const beakH=5*sc;
  const beakB1X=beakBaseX+headUpX*beakH*0.5, beakB1Y=beakBaseY+headUpY*beakH*0.5;
  const beakB2X=beakBaseX-headUpX*beakH*0.35, beakB2Y=beakBaseY-headUpY*beakH*0.35;
  const legLen=legStyle==="long"?52*sc:40*sc, legW=legStyle==="chunky"?5*sc:3.5*sc;
  const leg1X=bx-8*sc, leg2X=bx+6*sc;
  const legTopY=by+bry-4*sc+bodySink;
  const leg1BotY=legTopY+legLen-bodySink, leg2BotY=legTopY+legLen*0.92-bodySink;
  const tailX=bx+brx-4*sc, tailY=by-6*sc+bodySink;
  const wingHX=bx+8*sc, wingHY=by-8*sc+bodySink;
  const sandDepth=Math.max(0,(buried100-0.25)/0.75)*28*sc;
  const holeVisible=buried100>0.25;
  const bodyY = by + bodySink;
  const bodyNeckBaseY = neckBaseY;
  const hasAcc = (v) => accessories.includes(v);

  // Translate so groundY in ostrich-space aligns with oy in parent SVG,
  // and bx (body centre-x) aligns with ox
  const tx = ox - bx;
  const ty = oy - groundY;

  return (
    <g transform={`translate(${tx},${ty})`}>
      {[0,1,2].map(i=><ellipse key={i} cx={tailX+i*4*sc} cy={tailY-i*3*sc} rx={12*sc} ry={7*sc} fill={feather.wing} transform={`rotate(${-30+i*15},${tailX+i*4*sc},${tailY-i*3*sc})`} opacity={0.95-i*0.1}/>)}
      {[0,1,2].map(i=><ellipse key={i} cx={tailX+i*4*sc+Math.cos((-30+i*15)*Math.PI/180)*8*sc} cy={tailY-i*3*sc+Math.sin((-30+i*15)*Math.PI/180)*3*sc} rx={5*sc} ry={3.5*sc} fill={feather.body} transform={`rotate(${-30+i*15},${tailX+i*4*sc},${tailY-i*3*sc})`} opacity={0.4}/>)}
      <line x1={leg1X} y1={legTopY} x2={leg1X-3*sc} y2={leg1BotY} stroke="#E88070" strokeWidth={legW} strokeLinecap="round"/>
      <line x1={leg2X} y1={legTopY} x2={leg2X+2*sc} y2={leg2BotY} stroke="#E88070" strokeWidth={legW} strokeLinecap="round"/>
      {[[-10*sc,4*sc],[-3*sc,6*sc],[4*sc,5*sc]].map(([dx,dy],i)=><line key={i} x1={leg1X-3*sc} y1={leg1BotY} x2={leg1X-3*sc+dx} y2={leg1BotY+dy} stroke="#E88070" strokeWidth={legW*0.7} strokeLinecap="round"/>)}
      {[[-6*sc,5*sc],[2*sc,7*sc],[9*sc,4*sc]].map(([dx,dy],i)=><line key={i} x1={leg2X+2*sc} y1={leg2BotY} x2={leg2X+2*sc+dx} y2={leg2BotY+dy} stroke="#E88070" strokeWidth={legW*0.7} strokeLinecap="round"/>)}
      {hasAcc("flipflops")&&<g>
        <ellipse cx={leg1X-10*sc} cy={leg1BotY+5*sc} rx={9*sc} ry={3.5*sc} fill="#FF6B6B" opacity="0.9"/>
        <ellipse cx={leg2X+4*sc} cy={leg2BotY+5*sc} rx={9*sc} ry={3.5*sc} fill="#4ECDC4" opacity="0.9"/>
        <line x1={leg1X-10*sc} y1={leg1BotY+2*sc} x2={leg1X-5*sc} y2={leg1BotY-1*sc} stroke="#FF6B6B" strokeWidth={2*sc}/>
        <line x1={leg2X+4*sc} y1={leg2BotY+2*sc} x2={leg2X+9*sc} y2={leg2BotY-1*sc} stroke="#4ECDC4" strokeWidth={2*sc}/>
      </g>}
      <ellipse cx={bx} cy={bodyY} rx={brx} ry={bry} fill={feather.body}/>
      <ellipse cx={bx-8*sc} cy={bodyY-10*sc} rx={14*sc} ry={8*sc} fill="white" opacity="0.08"/>
      <ellipse cx={wingHX} cy={wingHY} rx={18*sc} ry={10*sc} fill={feather.wing} opacity="0.25" transform={`rotate(-15,${wingHX},${wingHY})`}/>
      {hasAcc("coconutbra")&&<g>
        <ellipse cx={bx-11*sc} cy={bodyY-6*sc} rx={9*sc} ry={7*sc} fill="#7a5230"/>
        <ellipse cx={bx+9*sc} cy={bodyY-6*sc} rx={9*sc} ry={7*sc} fill="#7a5230"/>
        <ellipse cx={bx-11*sc} cy={bodyY-6*sc} rx={7*sc} ry={5.5*sc} fill="#5C3A1E"/>
        <ellipse cx={bx+9*sc} cy={bodyY-6*sc} rx={7*sc} ry={5.5*sc} fill="#5C3A1E"/>
        <line x1={bx-11*sc} y1={bodyY-12*sc} x2={neckBaseX-2*sc} y2={bodyNeckBaseY+8*sc} stroke="#7a5230" strokeWidth={2*sc}/>
        <line x1={bx+9*sc} y1={bodyY-12*sc} x2={neckBaseX+4*sc} y2={bodyNeckBaseY+8*sc} stroke="#7a5230" strokeWidth={2*sc}/>
      </g>}
      <polygon points={`${nx1},${ny1} ${nx2},${ny2} ${nx3},${ny3} ${nx4},${ny4}`} fill={feather.neck}/>
      <ellipse cx={(nx1+nx4)/2} cy={(ny1+ny4)/2} rx={neckW*0.4} ry={neckLen*0.3} fill="white" opacity="0.12" transform={`rotate(${neckAngle*180/Math.PI},${(nx1+nx4)/2},${(ny1+ny4)/2})`}/>
      <ellipse cx={patchX} cy={patchY} rx={8*sc} ry={6*sc} fill={feather.wing} opacity="0.7"/>
      {hasAcc("bowtie")&&<g>
        <polygon points={`${neckBaseX-9*sc},${bodyNeckBaseY+2*sc} ${neckBaseX},${bodyNeckBaseY+8*sc} ${neckBaseX-9*sc},${bodyNeckBaseY+14*sc}`} fill="#D4537E"/>
        <polygon points={`${neckBaseX+9*sc},${bodyNeckBaseY+2*sc} ${neckBaseX},${bodyNeckBaseY+8*sc} ${neckBaseX+9*sc},${bodyNeckBaseY+14*sc}`} fill="#D4537E"/>
        <circle cx={neckBaseX} cy={bodyNeckBaseY+8*sc} r={3*sc} fill="#993556"/>
      </g>}
      {hasAcc("lei")&&<g>
        {[0,1,2,3,4,5,6,7].map(i=>{
          const a=(i/8)*Math.PI*2;
          const lx=neckBaseX+Math.cos(a)*11*sc;
          const ly=bodyNeckBaseY+16*sc+Math.sin(a)*4*sc;
          const colors=["#FF6B6B","#FFD93D","#FF8E53","#C77DFF","#FF6B9D","#4ECDC4","#FF6B6B","#FFD93D"];
          return <g key={i}><circle cx={lx} cy={ly} r={3.5*sc} fill={colors[i]} opacity="0.95"/><circle cx={lx} cy={ly} r={1.2*sc} fill="#fff" opacity="0.6"/></g>;
        })}
        <ellipse cx={neckBaseX} cy={bodyNeckBaseY+16*sc} rx={11*sc} ry={4*sc} fill="none" stroke="#2d8a4e" strokeWidth={1.5*sc} opacity="0.5"/>
      </g>}
      {!headBuried && (
        <g>
          <circle cx={headX} cy={headY} r={headR} fill={feather.neck}/>
          <ellipse cx={headX-headR*0.2} cy={headY-headR*0.3} rx={headR*0.35} ry={headR*0.25} fill="white" opacity="0.15"/>
          <polygon points={`${beakB1X},${beakB1Y} ${beakTipX+faceDx*2*sc},${beakTipY+faceDy*2*sc} ${beakB2X},${beakB2Y}`} fill="#c86020"/>
          <polygon points={`${beakB1X},${beakB1Y} ${beakTipX},${beakTipY} ${beakB2X-headUpX*2*sc},${beakB2Y-headUpY*2*sc}`} fill={feather.beak}/>
          <circle cx={eyeX} cy={eyeY} r={6*sc} fill="white"/>
          <circle cx={eyeX+0.5*sc} cy={eyeY+0.5*sc} r={4*sc} fill={eyeColor}/>
          <circle cx={eyeX+0.8*sc} cy={eyeY+0.8*sc} r={2*sc} fill="#1a1a1a"/>
          <circle cx={eyeX-0.5*sc} cy={eyeY-1*sc} r={1.2*sc} fill="white" opacity="0.9"/>
          {[-0.4,0,0.4].map((offset,i)=>{
            const la=lashAngle+offset;
            const lx1=eyeX+Math.cos(la)*5*sc, ly1=eyeY+Math.sin(la)*5*sc;
            const lx2=lx1+Math.cos(la-0.3)*5*sc, ly2=ly1+Math.sin(la-0.3)*5*sc;
            return <line key={i} x1={lx1} y1={ly1} x2={lx2} y2={ly2} stroke="#1a1a1a" strokeWidth={1.2*sc} strokeLinecap="round"/>;
          })}
          {hasAcc("sunglasses")&&<g>
            <rect x={eyeX-9*sc} y={eyeY-5*sc} width={16*sc} height={9*sc} rx={4} fill="#1a1a1a" opacity="0.85"/>
            <line x1={eyeX+7*sc} y1={eyeY-1*sc} x2={headX+headR-1} y2={eyeY+2*sc} stroke="#1a1a1a" strokeWidth={1.5*sc} strokeLinecap="round"/>
            <line x1={eyeX-9*sc} y1={eyeY-1*sc} x2={headX-headR+2} y2={eyeY+3*sc} stroke="#1a1a1a" strokeWidth={1.5*sc} strokeLinecap="round"/>
          </g>}
          {hasAcc("tophat")&&<g>
            <rect x={headX-11*sc} y={headY-headR-22*sc} width={22*sc} height={18*sc} rx={2} fill="#1a1a1a"/>
            <rect x={headX-15*sc} y={headY-headR-5*sc} width={30*sc} height={5*sc} rx={2} fill="#1a1a1a"/>
            <rect x={headX-10*sc} y={headY-headR-22*sc} width={22*sc} height={3*sc} rx={1} fill="#D4537E" opacity="0.8"/>
          </g>}
          {hasAcc("partyhat")&&<g>
            <polygon points={`${headX-12*sc},${headY-headR+2} ${headX+12*sc},${headY-headR+2} ${headX+2*sc},${headY-headR-26*sc}`} fill="#D4537E"/>
            <circle cx={headX+2*sc} cy={headY-headR-26*sc} r={4*sc} fill="#FAC775"/>
          </g>}
          {hasAcc("crown")&&<g>
            <polygon points={`${headX-13*sc},${headY-headR} ${headX-13*sc},${headY-headR-14*sc} ${headX-6*sc},${headY-headR-8*sc} ${headX},${headY-headR-16*sc} ${headX+6*sc},${headY-headR-8*sc} ${headX+13*sc},${headY-headR-14*sc} ${headX+13*sc},${headY-headR}`} fill="#EF9F27" stroke="#BA7517" strokeWidth={0.5}/>
            {[-8,0,8].map((dx,i)=><circle key={i} cx={headX+dx*sc} cy={headY-headR-2*sc} r={2.5*sc} fill="#D85A30"/>)}
          </g>}
          {hasAcc("widebrimhat")&&<g>
            <ellipse cx={headX+2*sc} cy={headY-headR+2*sc} rx={28*sc} ry={7*sc} fill="#D4A853"/>
            <ellipse cx={headX+2*sc} cy={headY-headR-8*sc} rx={14*sc} ry={11*sc} fill="#D4A853"/>
            <ellipse cx={headX+2*sc} cy={headY-headR+2*sc} rx={14*sc} ry={5*sc} fill="#C49040"/>
          </g>}
          {hasAcc("snorkel")&&<g>
            <rect x={eyeX-9*sc} y={eyeY-6*sc} width={16*sc} height={11*sc} rx={5} fill="#4ECDC4" opacity="0.6" stroke="#2B9E9E" strokeWidth={1.5*sc}/>
            <path d={`M ${headX-Math.cos(neckAngle)*headR*0.7} ${headY-Math.sin(neckAngle)*headR*0.3} C ${headX-headR*1.5} ${headY-headR*1.5} ${headX-headR} ${headY-headR*3} ${headX-headR*0.5} ${headY-headR*3.5}`} fill="none" stroke="#FF6B6B" strokeWidth={3*sc} strokeLinecap="round"/>
            <circle cx={headX-headR*0.5} cy={headY-headR*3.5} r={3*sc} fill="#FF6B6B"/>
          </g>}
        </g>
      )}
      {holeVisible&&<><ellipse cx={neckTipX} cy={groundY} rx={16*sc*Math.min(1,(buried100-0.25)/0.5)} ry={5*sc*Math.min(1,(buried100-0.25)/0.5)} fill="#b8945e" opacity="0.9"/>{buried100>0.5&&<ellipse cx={neckTipX} cy={groundY+2} rx={18*sc} ry={sandDepth*0.5} fill="#c8a96e" opacity="0.85"/>}</>}
    </g>
  );
}

// ── OSTRICH SVG wrapper (used in detail card + customize preview) ──
function OstrichSVG({ pct, feather, eyeColor, accessories = [], legStyle, size, name }) {
  const sc = size;
  const groundY = 170 * sc;
  const svgH = groundY + 30;
  // bx centres the body; ox=60 centres in a 120px-wide viewBox
  return (
    <svg width="100%" viewBox={`0 0 120 ${svgH}`} style={{overflow:"visible",display:"block"}}>
      <OstrichGroup pct={pct} feather={feather} eyeColor={eyeColor} accessories={accessories} legStyle={legStyle} size={size} name={name} ox={58*sc} oy={groundY}/>
    </svg>
  );
}

// ── ISLAND SCENE ─────────────────────────────────────────────────
function IslandScene({ members, myId, onSelectMember, selectedMember }) {
  const memberList = Object.values(members);
  const count = memberList.length;

  // Island grows with member count
  const islandW = Math.max(700, 300 + count * 190);
  const islandH = 420; // tall enough for ostriches above + sand below
  const islandCX = islandW / 2;
  // Sand ellipse center — sits in lower half of the scene
  const sandCY = 310;
  const islandRX = islandW * 0.40;
  const islandRY = 62;

  // The visible top of the sand ellipse — this is where feet stand
  const sandSurface = sandCY - islandRY + 10; // ~top of sand, ~258

  // Ostriches span the usable sand width (between palm trees)
  // Palm trees are at ~72% from center on each side
  const palmZone = islandRX * 0.68; // palm tree x offset from center
  const usableLeft = islandCX - palmZone * 0.80;
  const usableRight = islandCX + palmZone * 0.80;
  const usableW = usableRight - usableLeft;

  // Stagger ostriches: even indices go back row (higher, smaller), odd go front row (lower, bigger)
  // Back row: y = sandSurface - 18, scale *= 0.85
  // Front row: y = sandSurface + 8, scale *= 1.0
  // Each row gets its own evenly-spaced slots across the usable width
  const getPos = (i, total) => {
    const isBack = i % 2 === 0;
    const backCount = Math.ceil(total / 2);
    const frontCount = Math.floor(total / 2);
    const rowCount = isBack ? backCount : frontCount;
    const rowIndex = Math.floor(i / 2);
    // Back row is slightly narrower (more centred), front row uses full width
    const rowLeft = isBack ? usableLeft + usableW * 0.06 : usableLeft;
    const rowRight = isBack ? usableRight - usableW * 0.06 : usableRight;
    const rowW = rowRight - rowLeft;
    const slotW = rowCount > 0 ? rowW / rowCount : rowW;
    const baseX = rowLeft + slotW * rowIndex + slotW * 0.5;
    const feetY = isBack ? sandSurface - 14 : sandSurface + 10;
    return { x: baseX, feetY, isBack };
  };

  return (
    <div style={{width:"100%",overflowX:"auto",marginBottom:"1.5rem"}}>
      <svg width={islandW} height={islandH} viewBox={`0 0 ${islandW} ${islandH}`} style={{display:"block",margin:"0 auto",maxWidth:"100%"}}>
        {/* Ocean */}
        <rect x={0} y={0} width={islandW} height={islandH} fill="#64B5F6" rx={16}/>
        {/* Ocean waves */}
        {[0,1,2,3].map(i=>(
          <ellipse key={i} cx={islandW*0.15+i*islandW*0.22} cy={80+i*14} rx={islandW*0.12} ry={9} fill="#90CAF9" opacity="0.4"/>
        ))}

        {/* Island sand */}
        <ellipse cx={islandCX} cy={sandCY+10} rx={islandRX} ry={islandRY} fill="#F5DEB3"/>
        <ellipse cx={islandCX} cy={sandCY+5} rx={islandRX*0.95} ry={islandRY*0.8} fill="#EDD8A0"/>
        {/* Sand texture dots */}
        {[...Array(12)].map((_,i)=>(
          <circle key={i} cx={islandCX-islandRX*0.7+i*islandRX*0.13} cy={sandCY+18+(i%3)*6} r={2} fill="#D4A853" opacity="0.3"/>
        ))}

        {/* Starfish / shells */}
        <text x={islandCX-islandRX*0.55} y={sandCY+34} fontSize={14} opacity="0.7">⭐</text>
        <text x={islandCX+islandRX*0.48} y={sandCY+38} fontSize={12} opacity="0.6">🐚</text>

        {/* Palm tree 1 (left) — curved trunk with fronds */}
        {(() => {
          const tx = islandCX - islandRX * 0.72;
          const ty = sandCY + 10;
          const topX = islandCX - islandRX * 0.68;
          const topY = sandCY - 95;
          // Trunk segments (slightly curved, widening at base)
          const trunkPath = `M ${tx} ${ty} C ${tx+4} ${ty-30} ${topX+6} ${topY+50} ${topX} ${topY}`;
          const fronds = [
            { angle: -140, len: 52, droop: 18 },
            { angle: -110, len: 58, droop: 22 },
            { angle: -80,  len: 60, droop: 20 },
            { angle: -55,  len: 52, droop: 18 },
            { angle: -30,  len: 44, droop: 14 },
            { angle: -165, len: 40, droop: 12 },
          ];
          return (
            <g>
              {/* Trunk */}
              <path d={trunkPath} fill="none" stroke="#6B4226" strokeWidth={9} strokeLinecap="round"/>
              <path d={trunkPath} fill="none" stroke="#8B5E34" strokeWidth={7} strokeLinecap="round"/>
              {/* Bark notches */}
              {[0.15,0.28,0.42,0.55,0.68,0.8].map((t,i) => {
                const bx = tx + (topX-tx)*t + 4;
                const by = ty + (topY-ty)*t;
                return <line key={i} x1={bx-5} y1={by} x2={bx+2} y2={by+3} stroke="#6B4226" strokeWidth={2} strokeLinecap="round" opacity="0.7"/>;
              })}
              {/* Fronds */}
              {fronds.map((fr, i) => {
                const rad = fr.angle * Math.PI / 180;
                const midX = topX + Math.cos(rad) * fr.len * 0.55;
                const midY = topY + Math.sin(rad) * fr.len * 0.55 + fr.droop * 0.4;
                const endX = topX + Math.cos(rad) * fr.len;
                const endY = topY + Math.sin(rad) * fr.len + fr.droop;
                const perpX = -Math.sin(rad) * 7;
                const perpY = Math.cos(rad) * 7;
                return (
                  <g key={i}>
                    <path d={`M ${topX} ${topY} Q ${midX} ${midY} ${endX} ${endY}`}
                      fill="none" stroke="#1B5E20" strokeWidth={4} strokeLinecap="round" opacity="0.9"/>
                    <path d={`M ${topX} ${topY} Q ${midX+perpX*0.8} ${midY+perpY*0.8} ${endX+perpX} ${endY+perpY}`}
                      fill="none" stroke="#2E7D32" strokeWidth={2} strokeLinecap="round" opacity="0.6"/>
                    <path d={`M ${topX} ${topY} Q ${midX-perpX*0.8} ${midY-perpY*0.8} ${endX-perpX} ${endY-perpY}`}
                      fill="none" stroke="#2E7D32" strokeWidth={2} strokeLinecap="round" opacity="0.6"/>
                    {/* Leaflets along frond */}
                    {[0.3,0.5,0.7,0.87].map((t2, j) => {
                      const lx = topX + (endX-topX)*t2;
                      const ly = topY + (endY-topY)*t2 + fr.droop*t2*t2*0.6;
                      const llen = 10 - j*1.5;
                      return (
                        <g key={j}>
                          <line x1={lx} y1={ly} x2={lx+perpX*llen/7} y2={ly+perpY*llen/7+llen*0.4} stroke="#388E3C" strokeWidth={1.5} strokeLinecap="round" opacity="0.8"/>
                          <line x1={lx} y1={ly} x2={lx-perpX*llen/7} y2={ly-perpY*llen/7+llen*0.4} stroke="#388E3C" strokeWidth={1.5} strokeLinecap="round" opacity="0.8"/>
                        </g>
                      );
                    })}
                  </g>
                );
              })}
              {/* Coconuts */}
              {[[-4,4],[4,6],[0,9]].map(([dx,dy],i)=><circle key={i} cx={topX+dx} cy={topY+dy} r={4} fill="#7a5230"/>)}
            </g>
          );
        })()}

        {/* Palm tree 2 (right) if island wide enough */}
        {islandW > 450 && (() => {
          const tx = islandCX + islandRX * 0.68;
          const ty = sandCY + 8;
          const topX = islandCX + islandRX * 0.63;
          const topY = sandCY - 87;
          const trunkPath = `M ${tx} ${ty} C ${tx-3} ${ty-28} ${topX-5} ${topY+45} ${topX} ${topY}`;
          const fronds = [
            { angle: -40,  len: 52, droop: 18 },
            { angle: -70,  len: 58, droop: 22 },
            { angle: -100, len: 60, droop: 20 },
            { angle: -125, len: 52, droop: 18 },
            { angle: -150, len: 44, droop: 14 },
            { angle: -18,  len: 40, droop: 12 },
          ];
          return (
            <g>
              <path d={trunkPath} fill="none" stroke="#6B4226" strokeWidth={8} strokeLinecap="round"/>
              <path d={trunkPath} fill="none" stroke="#8B5E34" strokeWidth={6} strokeLinecap="round"/>
              {[0.15,0.28,0.42,0.55,0.68,0.8].map((t,i) => {
                const bx = tx + (topX-tx)*t - 3;
                const by = ty + (topY-ty)*t;
                return <line key={i} x1={bx-3} y1={by} x2={bx+4} y2={by+3} stroke="#6B4226" strokeWidth={2} strokeLinecap="round" opacity="0.7"/>;
              })}
              {fronds.map((fr, i) => {
                const rad = fr.angle * Math.PI / 180;
                const midX = topX + Math.cos(rad) * fr.len * 0.55;
                const midY = topY + Math.sin(rad) * fr.len * 0.55 + fr.droop * 0.4;
                const endX = topX + Math.cos(rad) * fr.len;
                const endY = topY + Math.sin(rad) * fr.len + fr.droop;
                const perpX = -Math.sin(rad) * 7;
                const perpY = Math.cos(rad) * 7;
                return (
                  <g key={i}>
                    <path d={`M ${topX} ${topY} Q ${midX} ${midY} ${endX} ${endY}`}
                      fill="none" stroke="#1B5E20" strokeWidth={4} strokeLinecap="round" opacity="0.9"/>
                    <path d={`M ${topX} ${topY} Q ${midX+perpX*0.8} ${midY+perpY*0.8} ${endX+perpX} ${endY+perpY}`}
                      fill="none" stroke="#2E7D32" strokeWidth={2} strokeLinecap="round" opacity="0.6"/>
                    <path d={`M ${topX} ${topY} Q ${midX-perpX*0.8} ${midY-perpY*0.8} ${endX-perpX} ${endY-perpY}`}
                      fill="none" stroke="#2E7D32" strokeWidth={2} strokeLinecap="round" opacity="0.6"/>
                    {[0.3,0.5,0.7,0.87].map((t2, j) => {
                      const lx = topX + (endX-topX)*t2;
                      const ly = topY + (endY-topY)*t2 + fr.droop*t2*t2*0.6;
                      const llen = 10 - j*1.5;
                      return (
                        <g key={j}>
                          <line x1={lx} y1={ly} x2={lx+perpX*llen/7} y2={ly+perpY*llen/7+llen*0.4} stroke="#388E3C" strokeWidth={1.5} strokeLinecap="round" opacity="0.8"/>
                          <line x1={lx} y1={ly} x2={lx-perpX*llen/7} y2={ly-perpY*llen/7+llen*0.4} stroke="#388E3C" strokeWidth={1.5} strokeLinecap="round" opacity="0.8"/>
                        </g>
                      );
                    })}
                  </g>
                );
              })}
              {[[-4,4],[4,6],[0,9]].map(([dx,dy],i)=><circle key={i} cx={topX+dx} cy={topY+dy} r={3.5} fill="#7a5230"/>)}
            </g>
          );
        })()}

        {/* Ostriches — back row first so front row draws on top */}
        {[...memberList.map((m,i)=>({member:m,i}))].sort((a,b)=>{
          const aBack = a.i % 2 === 0;
          const bBack = b.i % 2 === 0;
          return (bBack ? 0 : 1) - (aBack ? 0 : 1); // back row (true) sorts before front row
        }).map(({member, i}) => {
          const pos = getPos(i, count);
          const f = FEATHER_COLORS[member.customization?.feather ?? 0];
          const e = EYE_COLORS[member.customization?.eye ?? 0];
          const accs = member.customization?.accessories ?? [];
          const leg = member.customization?.legStyle ?? "normal";
          const baseSz = SIZE_OPTIONS[member.customization?.size ?? 1].scale * 0.7;
          const sz = pos.isBack ? baseSz * 0.82 : baseSz;
          const isMe = member.id === myId;
          const isSelected = selectedMember === member.id;
          const nameY = pos.feetY + 15;
          const nameSz = pos.isBack ? 9 : 10;
          return (
            <g key={member.id} onClick={() => onSelectMember(member.id === selectedMember ? null : member.id)} style={{cursor:"pointer"}}>
              {(isSelected || isMe) && <ellipse cx={pos.x} cy={pos.feetY + 4} rx={pos.isBack?32:40} ry={pos.isBack?5:7} fill={isMe?"#534AB7":"#FFD93D"} opacity="0.3"/>}
              <OstrichGroup pct={member.pct} feather={f} eyeColor={e.color} accessories={accs} legStyle={leg} size={sz} ox={pos.x} oy={pos.feetY}/>
              <text x={pos.x} y={nameY} textAnchor="middle" fontSize={nameSz} fontWeight={isMe?"700":"500"} fill={isMe?"#534AB7":"#555"} opacity={pos.isBack?0.8:1}>
                {member.name}
              </text>
            </g>
          );
        })}

        {/* Add teammate prompt if empty */}
        {count === 0 && <text x={islandCX} y={sandCY} textAnchor="middle" fontSize={13} fill="#aaa">No ostriches yet!</text>}
      </svg>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────
const { useState, useEffect, useRef } = React;

function App() {
  const [view, setView] = useState("home");
  const [roomCode, setRoomCode] = useState("");
  const [roomName, setRoomName] = useState("");
  const [newRoomName, setNewRoomName] = useState("");
  const [joinInput, setJoinInput] = useState("");
  const [joinName, setJoinName] = useState("");
  const [myName, setMyName] = useState("");
  const [members, setMembers] = useState({});
  const [myId, setMyId] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [roomCreatedBy, setRoomCreatedBy] = useState(null);
  const [customizing, setCustomizing] = useState(null);
  const [customTemp, setCustomTemp] = useState(DEFAULT_CUSTOMIZATION);
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(false);
  const [copiedLink, setCopiedLink] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [editingRoomName, setEditingRoomName] = useState(false);
  const [roomNameDraft, setRoomNameDraft] = useState("");
  const [recentRooms, setRecentRooms] = useState([]);
  const [messages, setMessages] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [selectedMember, setSelectedMember] = useState(null);
  const dbRefRef = useRef(null);
  const chatEndRef = useRef(null);
  const today = new Date().toDateString();

  const loadRecentRooms = () => { try { return JSON.parse(localStorage.getItem("ostrich_recent") || "[]"); } catch { return []; } };
  const saveRecentRoom = (code, name, mName, mId) => {
    try {
      const rooms = loadRecentRooms().filter(r => r.code !== code);
      rooms.unshift({ code, name: name || code, myName: mName, myId: mId, date: today });
      localStorage.setItem("ostrich_recent", JSON.stringify(rooms.slice(0, 6)));
    } catch {}
  };

  useEffect(() => {
    setRecentRooms(loadRecentRooms());
    const params = new URLSearchParams(window.location.search);
    const linkCode = params.get("room");
    if (linkCode) { setJoinInput(linkCode.toUpperCase()); setView("join"); return; }
    try {
      const raw = localStorage.getItem("ostrich_session");
      if (raw) {
        const d = JSON.parse(raw);
        if (d.date === today && d.roomCode && d.myId && d.myName) {
          setRoomCode(d.roomCode); setMyId(d.myId); setMyName(d.myName);
          setRoomName(d.roomName || d.roomCode); setIsAdmin(d.isAdmin || false);
          setView("room");
        } else localStorage.removeItem("ostrich_session");
      }
    } catch {}
  }, []);

  useEffect(() => { if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  useEffect(() => {
    if (view !== "room" || !roomCode || !USING_FIREBASE) return;
    if (dbRefRef.current) dbRefRef.current.off();
    const ref = db.ref(`rooms/${roomCode}/members`);
    dbRefRef.current = ref;
    ref.on("value", snap => { setMembers(snap.val() || {}); });
    db.ref(`rooms/${roomCode}/createdBy`).on("value", snap => {
      const creator = snap.val() || null;
      setRoomCreatedBy(creator);
      if (creator && creator === myId) { setIsAdmin(true); saveSession(roomCode, myId, myName, roomName, true); }
    });
    db.ref(`rooms/${roomCode}`).on("value", snap => {
      if (snap.exists() && snap.val() === null) {
        localStorage.removeItem("ostrich_session");
        setMembers({}); setMyId(null); setRoomCode(""); setRoomName("");
        setIsAdmin(false); setMessages([]); setRecentRooms(loadRecentRooms()); setView("home");
      }
    });
    db.ref(`rooms/${roomCode}/chat`).limitToLast(100).on("value", snap => {
      const val = snap.val();
      setMessages(val ? Object.values(val).sort((a, b) => a.ts - b.ts) : []);
    });
    return () => { if (dbRefRef.current) dbRefRef.current.off(); };
  }, [view, roomCode]);

  const saveSession = (code, id, name, rName, admin) => {
    try { localStorage.setItem("ostrich_session", JSON.stringify({ roomCode: code, myId: id, myName: name, roomName: rName, isAdmin: admin, date: today })); } catch {}
  };

  const createRoom = () => {
    if (!myName.trim()) { setError("Enter your name"); return; }
    const code = genCode(), id = `u_${Date.now()}`;
    const rName = newRoomName.trim() || code;
    setRoomCode(code); setMyId(id); setRoomName(rName); setIsAdmin(true);
    setView("room"); setError("");
    saveSession(code, id, myName.trim(), rName, true);
    saveRecentRoom(code, rName, myName.trim(), id);
    if (USING_FIREBASE) {
      db.ref(`rooms/${code}`).set({ name: rName, createdBy: id, date: today, members: { [id]: { id, name: myName.trim(), pct: 0, customization: DEFAULT_CUSTOMIZATION } } });
    } else { setMembers({ [id]: { id, name: myName.trim(), pct: 0, customization: DEFAULT_CUSTOMIZATION } }); }
  };

  const joinRoom = (code, name, existingId) => {
    const resolvedCode = (code || joinInput).trim().toUpperCase();
    const resolvedName = (name || joinName).trim();
    if (!resolvedCode) { setError("Enter a room code"); return; }
    if (!resolvedName) { setError("Enter your name"); return; }
    const id = existingId || `u_${Date.now()}`;
    setRoomCode(resolvedCode); setMyId(id); setMyName(resolvedName); setIsAdmin(false);
    setView("room"); setError("");
    if (USING_FIREBASE) {
      db.ref(`rooms/${resolvedCode}/name`).once("value", snap => {
        const rName = snap.val() || resolvedCode;
        setRoomName(rName); saveSession(resolvedCode, id, resolvedName, rName, false); saveRecentRoom(resolvedCode, rName, resolvedName, id);
      }).catch(() => { setRoomName(resolvedCode); saveSession(resolvedCode, id, resolvedName, resolvedCode, false); saveRecentRoom(resolvedCode, resolvedCode, resolvedName, id); });
    } else { saveSession(resolvedCode, id, resolvedName, resolvedCode, false); saveRecentRoom(resolvedCode, resolvedCode, resolvedName, id); }
    if (!existingId) {
      const attemptWrite = (attempts) => {
        if (attempts <= 0) return;
        if (USING_FIREBASE) { db.ref(`rooms/${resolvedCode}/members/${id}`).set({ id, name: resolvedName, pct: 0, customization: DEFAULT_CUSTOMIZATION }).catch(() => setTimeout(() => attemptWrite(attempts - 1), 2000)); }
        else { setMembers(prev => ({ ...prev, [id]: { id, name: resolvedName, pct: 0, customization: DEFAULT_CUSTOMIZATION } })); }
      };
      attemptWrite(3);
    }
  };

  const sendMessage = () => {
    const text = chatInput.trim();
    if (!text || !myId || !myName) return;
    const msgId = `m_${Date.now()}`;
    const msg = { id: msgId, userId: myId, name: myName, text, ts: Date.now() };
    if (USING_FIREBASE) { db.ref(`rooms/${roomCode}/chat/${msgId}`).set(msg); }
    else { setMessages(prev => [...prev, msg]); }
    setChatInput("");
  };

  const deleteMessage = (msgId) => {
    if (!USING_FIREBASE) { setMessages(prev => prev.filter(m => m.id !== msgId)); return; }
    db.ref(`rooms/${roomCode}/chat/${msgId}`).remove();
  };

  const claimAdmin = () => {
    if (!USING_FIREBASE || !myId) return;
    db.ref(`rooms/${roomCode}/createdBy`).transaction(existing => { if (existing) return; return myId; }, (err, committed) => {
      if (committed) { setIsAdmin(true); setRoomCreatedBy(myId); saveSession(roomCode, myId, myName, roomName, true); }
    });
  };

  const saveRoomName = () => {
    const newName = roomNameDraft.trim();
    if (!newName) { setEditingRoomName(false); return; }
    setRoomName(newName); setEditingRoomName(false);
    if (USING_FIREBASE) db.ref(`rooms/${roomCode}/name`).set(newName);
    try { const updated = loadRecentRooms().map(r => r.code === roomCode ? { ...r, name: newName } : r); localStorage.setItem("ostrich_recent", JSON.stringify(updated)); } catch {}
    saveSession(roomCode, myId, myName, newName, isAdmin);
  };

  const deleteRoom = () => {
    if (USING_FIREBASE) db.ref(`rooms/${roomCode}`).remove();
    try { const updated = loadRecentRooms().filter(r => r.code !== roomCode); localStorage.setItem("ostrich_recent", JSON.stringify(updated)); } catch {}
    localStorage.removeItem("ostrich_session");
    setMembers({}); setMyId(null); setRoomCode(""); setRoomName(""); setIsAdmin(false); setConfirmDelete(false); setMessages([]);
    setRecentRooms(loadRecentRooms()); setView("home");
  };

  const updatePct = (pct) => {
    if (!myId) return;
    const me = members[myId]; if (!me) return;
    if (!USING_FIREBASE) { setMembers(prev => ({ ...prev, [myId]: { ...me, pct } })); return; }
    db.ref(`rooms/${roomCode}/members/${myId}/pct`).set(pct);
  };

  const saveCustomize = () => {
    if (!myId) return;
    const me = members[myId]; if (!me) return;
    if (!USING_FIREBASE) { setMembers(prev => ({ ...prev, [myId]: { ...me, customization: customTemp } })); }
    else { db.ref(`rooms/${roomCode}/members/${myId}/customization`).set(customTemp); }
    setCustomizing(null);
  };

  const removeMember = (id) => {
    if (id === myId) {
      if (USING_FIREBASE) db.ref(`rooms/${roomCode}/members/${myId}`).remove();
      localStorage.removeItem("ostrich_session"); setMembers({}); setMyId(null); setRoomCode(""); setIsAdmin(false); setView("home"); return;
    }
    if (USING_FIREBASE) db.ref(`rooms/${roomCode}/members/${id}`).remove();
    else setMembers(prev => { const n = {...prev}; delete n[id]; return n; });
  };

  const copyCode = () => { try { navigator.clipboard.writeText(roomCode); } catch {} setCopied(true); setTimeout(() => setCopied(false), 2000); };
  const copyJoinLink = () => { const base = window.location.href.split("?")[0]; try { navigator.clipboard.writeText(`${base}?room=${roomCode}`); } catch {} setCopiedLink(true); setTimeout(() => setCopiedLink(false), 2000); };
  const switchRoom = () => { localStorage.removeItem("ostrich_session"); setRoomCode(""); setMyId(null); setMembers({}); setRoomName(""); setIsAdmin(false); setMessages([]); setRecentRooms(loadRecentRooms()); setView("home"); };

  const memberList = Object.values(members);
  const me = members[myId];
  const myLabel = me ? getLabel(me.pct) : null;
  const selMember = selectedMember ? members[selectedMember] : null;

  const s = {
    page: { padding: "2rem 1rem", maxWidth: 520, margin: "0 auto" },
    card: { background: "#fff", borderRadius: 12, border: "1px solid #e5e5e5", padding: "1rem 1.25rem", marginBottom: "1rem" },
    h1: { fontSize: 22, fontWeight: 600, margin: "0 0 6px" },
    h2: { fontSize: 18, fontWeight: 600, margin: "0 0 1.5rem" },
    label: { fontSize: 13, color: "#666", display: "block", marginBottom: 6 },
    btnPrimary: { padding: "9px 20px", borderRadius: 8, border: "none", background: "#534AB7", color: "#fff", fontSize: 14, fontWeight: 500, cursor: "pointer", width: "100%" },
    btnSecondary: { padding: "9px 20px", borderRadius: 8, border: "1px solid #ddd", background: "#fff", color: "#333", fontSize: 14, fontWeight: 500, cursor: "pointer", width: "100%" },
    btnSmall: { padding: "5px 12px", borderRadius: 6, border: "1px solid #ddd", background: "#fff", color: "#333", fontSize: 12, cursor: "pointer" },
    btnDanger: { padding: "5px 12px", borderRadius: 6, border: "1px solid #e74c3c", background: "#fff", color: "#e74c3c", fontSize: 12, cursor: "pointer" },
    error: { color: "#c0392b", fontSize: 13, marginBottom: 12 },
  };

  // ── HOME ──
  if (view === "home") return (
    <div style={{...s.page, textAlign:"center"}}>
      <div style={{width:130,margin:"0 auto 8px"}}>
        <OstrichSVG pct={0} feather={FEATHER_COLORS[0]} eyeColor={EYE_COLORS[0].color} accessories={[]} legStyle="normal" size={1} name=""/>
      </div>
      <h1 style={s.h1}>Ostrich-O-Meter</h1>
      <p style={{color:"#888",fontSize:14,margin:"0 0 2rem"}}>Team check-in, one buried head at a time</p>
      {recentRooms.length > 0 && (
        <div style={{marginBottom:"1.5rem",textAlign:"left"}}>
          <p style={{fontSize:12,color:"#888",marginBottom:8,fontWeight:500}}>Recent rooms</p>
          {recentRooms.map(r => (
            <div key={r.code} onClick={()=>joinRoom(r.code, r.myName, r.myId)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#fff",border:"1px solid #e5e5e5",borderRadius:8,marginBottom:6,cursor:"pointer"}}>
              <div><p style={{fontSize:14,fontWeight:500,margin:0}}>{r.name}</p><p style={{fontSize:11,color:"#aaa",margin:0}}>Code: {r.code} · as {r.myName}</p></div>
              <span style={{fontSize:18,color:"#ccc"}}>›</span>
            </div>
          ))}
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:260,margin:"0 auto"}}>
        <button style={s.btnPrimary} onClick={()=>{setView("create");setError("");}}>Create a room</button>
        <button style={s.btnSecondary} onClick={()=>{setView("join");setError("");}}>Join with a code</button>
      </div>
    </div>
  );

  // ── CREATE ──
  if (view === "create") return (
    <div style={s.page}>
      <button style={{...s.btnSmall,marginBottom:20}} onClick={()=>setView("home")}>← Back</button>
      <h2 style={s.h2}>Create a room</h2>
      <div style={{marginBottom:12}}><label style={s.label}>Room name</label><input value={newRoomName} onChange={e=>setNewRoomName(e.target.value)} placeholder="e.g. Design Team"/></div>
      <div style={{marginBottom:16}}><label style={s.label}>Your name</label><input value={myName} onChange={e=>setMyName(e.target.value)} placeholder="e.g. Jordan" onKeyDown={e=>e.key==="Enter"&&createRoom()}/></div>
      {error&&<p style={s.error}>{error}</p>}
      <button style={s.btnPrimary} onClick={createRoom}>Create room</button>
    </div>
  );

  // ── JOIN ──
  if (view === "join") return (
    <div style={s.page}>
      <button style={{...s.btnSmall,marginBottom:20}} onClick={()=>{ setJoinInput(""); setView(roomCode?"room":"home"); }}>← Back</button>
      <h2 style={s.h2}>Join a room</h2>
      <div style={{marginBottom:12}}><label style={s.label}>Room code</label><input value={joinInput} onChange={e=>setJoinInput(e.target.value)} placeholder="ABC123" style={{textTransform:"uppercase",letterSpacing:3}}/></div>
      <div style={{marginBottom:16}}><label style={s.label}>Your name</label><input value={joinName} onChange={e=>setJoinName(e.target.value)} placeholder="e.g. Alex" onKeyDown={e=>e.key==="Enter"&&joinRoom()}/></div>
      {error&&<p style={s.error}>{error}</p>}
      <button style={s.btnPrimary} onClick={()=>joinRoom()}>Join room</button>
    </div>
  );

  // ── CUSTOMIZE ──
  if (customizing !== null) {
    const f = FEATHER_COLORS[customTemp.feather];
    const e = EYE_COLORS[customTemp.eye];
    const sz = SIZE_OPTIONS[customTemp.size].scale;
    const accs = customTemp.accessories || [];
    const toggleAcc = (val) => {
      if (val === "none") { setCustomTemp(p => ({...p, accessories: []})); return; }
      setCustomTemp(p => {
        const cur = p.accessories || [];
        return { ...p, accessories: cur.includes(val) ? cur.filter(a => a !== val) : [...cur, val] };
      });
    };
    const pill = (active) => ({ padding:"4px 10px", borderRadius:6, border: active?"1.5px solid #534AB7":"1px solid #ddd", background: active?"#EEEDFE":"#fff", color: active?"#534AB7":"#333", fontSize:12, cursor:"pointer" });
    return (
      <div style={s.page}>
        <h2 style={{...s.h2,marginBottom:"0.75rem"}}>Customize your ostrich</h2>
        <div style={{width:130,margin:"0 auto 1.25rem"}}>
          <OstrichSVG pct={15} feather={f} eyeColor={e.color} accessories={accs} legStyle={customTemp.legStyle} size={sz} name={myName}/>
        </div>
        {[
          {label:"Feather color", content: FEATHER_COLORS.map((o,i)=>(
            <button key={i} title={o.name} onClick={()=>setCustomTemp(p=>({...p,feather:i}))} style={{width:30,height:30,borderRadius:"50%",border:customTemp.feather===i?"2.5px solid #1a1a1a":"1px solid #ddd",background:o.body,cursor:"pointer",padding:0}}/>
          ))},
          {label:"Eye color", content: EYE_COLORS.map((o,i)=>(
            <button key={i} title={o.name} onClick={()=>setCustomTemp(p=>({...p,eye:i}))} style={{width:30,height:30,borderRadius:"50%",border:customTemp.eye===i?"2.5px solid #1a1a1a":"1px solid #ddd",background:o.color,cursor:"pointer",padding:0}}/>
          ))},
          {label:"Accessories (pick any)", content: ACCESSORIES.map(o=>(
            <button key={o.value} onClick={()=>toggleAcc(o.value)}
              style={pill(o.value==="none" ? accs.length===0 : accs.includes(o.value))}>{o.name}</button>
          ))},
          {label:"Leg style", content: LEG_STYLES.map(o=><button key={o.value} onClick={()=>setCustomTemp(p=>({...p,legStyle:o.value}))} style={pill(customTemp.legStyle===o.value)}>{o.name}</button>)},
          {label:"Size", content: SIZE_OPTIONS.map((o,i)=><button key={i} onClick={()=>setCustomTemp(p=>({...p,size:i}))} style={pill(customTemp.size===i)}>{o.name}</button>)},
        ].map(sec=>(
          <div key={sec.label} style={{marginBottom:14}}>
            <p style={s.label}>{sec.label}</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{sec.content}</div>
          </div>
        ))}
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button style={{...s.btnPrimary,width:"auto",padding:"8px 20px"}} onClick={saveCustomize}>Save</button>
          <button style={{...s.btnSecondary,width:"auto",padding:"8px 20px"}} onClick={()=>setCustomizing(null)}>Cancel</button>
        </div>
      </div>
    );
  }

  // ── ROOM ──
  return (
    <div style={{padding:"1rem",maxWidth:780,margin:"0 auto"}}>
      {confirmDelete && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:12,padding:"1.5rem",maxWidth:320,width:"90%",textAlign:"center"}}>
            <p style={{fontWeight:600,fontSize:16,marginBottom:8}}>Delete "{roomName}"?</p>
            <p style={{fontSize:13,color:"#888",marginBottom:20}}>This removes the room, all ostriches, and all chat messages permanently.</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button style={{...s.btnSecondary,width:"auto"}} onClick={()=>setConfirmDelete(false)}>Cancel</button>
              <button style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#e74c3c",color:"#fff",fontSize:14,fontWeight:500,cursor:"pointer"}} onClick={deleteRoom}>Delete room</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:10}}>
        <div>
          {editingRoomName ? (
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <input value={roomNameDraft} onChange={e=>setRoomNameDraft(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") saveRoomName(); if(e.key==="Escape") setEditingRoomName(false); }} style={{fontSize:16,fontWeight:600,padding:"2px 8px",borderRadius:6,border:"1.5px solid #534AB7",width:180}} autoFocus/>
              <button style={{...s.btnSmall,background:"#534AB7",color:"#fff",border:"none"}} onClick={saveRoomName}>Save</button>
              <button style={s.btnSmall} onClick={()=>setEditingRoomName(false)}>Cancel</button>
            </div>
          ) : (
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <h1 style={{fontSize:18,fontWeight:600,margin:0}}>{roomName || "Ostrich-O-Meter"}</h1>
              {isAdmin && <button onClick={()=>{ setRoomNameDraft(roomName); setEditingRoomName(true); }} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#aaa",padding:0}}>✏️</button>}
            </div>
          )}
          <p style={{fontSize:11,color:"#aaa",margin:0}}>Ostrich-O-Meter {isAdmin && <span style={{color:"#534AB7",fontWeight:500}}>· Admin</span>}</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"#888"}}>Code:</span>
          <code style={{fontSize:14,fontWeight:600,letterSpacing:2,padding:"3px 10px",background:"#f0f0f0",borderRadius:6,border:"1px solid #e0e0e0"}}>{roomCode}</code>
          <button style={s.btnSmall} onClick={copyCode}>{copied?"Copied!":"Copy code"}</button>
          <button style={s.btnSmall} onClick={copyJoinLink}>{copiedLink?"Link copied!":"Copy join link"}</button>
          <button style={s.btnSmall} onClick={switchRoom}>Switch room</button>
          {isAdmin && <button style={s.btnDanger} onClick={()=>setConfirmDelete(true)}>Delete room</button>}
          {!isAdmin && !roomCreatedBy && <button style={{...s.btnSmall,color:"#534AB7",borderColor:"#534AB7"}} onClick={claimAdmin}>Claim admin</button>}
        </div>
      </div>

      {/* My slider */}
      {me && (
        <div style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div>
              <p style={{fontSize:13,color:"#888",margin:"0 0 2px"}}>My ostrich percentage</p>
              <p style={{fontSize:24,fontWeight:600,margin:0,color:myLabel?.color}}>{me.pct}%</p>
              <p style={{fontSize:12,color:"#888",margin:"2px 0 0",fontStyle:"italic"}}>{myLabel?.label}</p>
            </div>
            <button style={s.btnSmall} onClick={()=>{setCustomizing(myId);setCustomTemp({...DEFAULT_CUSTOMIZATION,...me.customization,accessories:me.customization?.accessories||[]});}}>Customize</button>
          </div>
          <input type="range" min={0} max={200} step={1} value={me.pct} onChange={e=>updatePct(Number(e.target.value))}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#aaa",marginTop:4}}>
            <span>Head high</span><span style={{color:"#BA7517"}}>100%</span><span>💀 200%</span>
          </div>
        </div>
      )}

      {/* Island scene */}
      <IslandScene members={members} myId={myId} onSelectMember={setSelectedMember} selectedMember={selectedMember}/>

      {/* Selected member info + scoreboard */}
      <div style={{display:"flex",gap:12,marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {/* Scoreboard */}
        <div style={{flex:"1 1 200px",background:"#fff",borderRadius:12,border:"1px solid #e5e5e5",padding:"0.75rem",minWidth:180}}>
          <p style={{fontSize:13,fontWeight:600,margin:"0 0 10px",color:"#555"}}>🏝️ Standings</p>
          {memberList.length === 0 && <p style={{fontSize:12,color:"#ccc"}}>No one here yet</p>}
          {memberList.sort((a,b)=>b.pct-a.pct).map(m => {
            const lbl = getLabel(m.pct);
            const isMe = m.id === myId;
            const isSel = m.id === selectedMember;
            const isDead = m.pct >= 200;
            return (
              <div key={m.id} onClick={()=>setSelectedMember(m.id===selectedMember?null:m.id)}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 8px",borderRadius:8,marginBottom:4,cursor:"pointer",background:isSel?"#f0effe":isMe?"#f8f7ff":"transparent",border:isSel?"1px solid #534AB7":"1px solid transparent"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {(isMe||isAdmin) && <button onClick={e=>{e.stopPropagation();removeMember(m.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#ddd",padding:0,lineHeight:1}}>×</button>}
                  <span style={{fontSize:13,fontWeight:isMe?600:400}}>{isDead?"🪦 ":""}{m.name}{isMe?" (you)":""}</span>
                </div>
                <div style={{textAlign:"right"}}>
                  <span style={{fontSize:13,fontWeight:600,color:lbl.color}}>{m.pct}%</span>
                  <p style={{fontSize:9,color:"#aaa",margin:0,fontStyle:"italic"}}>{isDead ? getEpitaph(m.name) : lbl.label}</p>
                </div>
              </div>
            );
          })}
          <div onClick={()=>setView("join")} style={{marginTop:8,padding:"6px 8px",borderRadius:8,border:"1px dashed #ddd",textAlign:"center",cursor:"pointer",fontSize:12,color:"#aaa"}}>+ Add teammate</div>
        </div>

        {/* Selected ostrich detail */}
        {selMember && (
          <div style={{flex:"1 1 180px",background:"#fff",borderRadius:12,border:"1.5px solid #534AB7",padding:"0.75rem",minWidth:160,textAlign:"center"}}>
            <div style={{width:100,margin:"0 auto"}}>
              <OstrichSVG pct={selMember.pct} feather={FEATHER_COLORS[selMember.customization?.feather??0]} eyeColor={EYE_COLORS[selMember.customization?.eye??0].color} accessories={selMember.customization?.accessories??[]} legStyle={selMember.customization?.legStyle??"normal"} size={SIZE_OPTIONS[selMember.customization?.size??1].scale*0.85} name={selMember.name}/>
            </div>
            <p style={{fontWeight:600,fontSize:14,margin:"4px 0 2px"}}>{selMember.name}</p>
            <p style={{fontSize:20,fontWeight:700,color:getLabel(selMember.pct).color,margin:"0 0 2px"}}>{selMember.pct}%</p>
            <p style={{fontSize:11,color:"#888",fontStyle:"italic"}}>{getLabel(selMember.pct).label}</p>
            <button style={{...s.btnSmall,marginTop:8,fontSize:11}} onClick={()=>setSelectedMember(null)}>Close</button>
          </div>
        )}
      </div>

      {/* Chat */}
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e5e5",marginBottom:"1.5rem",overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #f0f0f0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <p style={{fontWeight:600,fontSize:14,margin:0}}>💬 Room chat</p>
          <p style={{fontSize:11,color:"#aaa",margin:0}}>{messages.length} message{messages.length!==1?"s":""}</p>
        </div>
        <div className="chat-box">
          {messages.length === 0 && <p style={{fontSize:13,color:"#ccc",textAlign:"center",marginTop:60}}>No messages yet — say something! 🦤</p>}
          {messages.map(msg => {
            const isMe = msg.userId === myId;
            return (
              <div key={msg.id} style={{display:"flex",flexDirection:isMe?"row-reverse":"row",gap:8,alignItems:"flex-start"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:isMe?"#534AB7":"#e5e5e5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:isMe?"#fff":"#888",flexShrink:0}}>
                  {msg.name.charAt(0).toUpperCase()}
                </div>
                <div style={{maxWidth:"70%"}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:6,justifyContent:isMe?"flex-end":"flex-start",marginBottom:3}}>
                    <span style={{fontSize:11,fontWeight:600,color:isMe?"#534AB7":"#555"}}>{msg.name}</span>
                    <span style={{fontSize:10,color:"#ccc"}}>{formatTime(msg.ts)}</span>
                    {(isMe||isAdmin)&&<button onClick={()=>deleteMessage(msg.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#ddd",padding:0,lineHeight:1}}>✕</button>}
                  </div>
                  <div style={{background:isMe?"#534AB7":"#f5f5f3",color:isMe?"#fff":"#1a1a1a",borderRadius:isMe?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"7px 12px",fontSize:13,lineHeight:1.4,wordBreak:"break-word"}}>{msg.text}</div>
                </div>
              </div>
            );
          })}
          <div ref={chatEndRef}/>
        </div>
        <div style={{padding:"10px 12px",borderTop:"1px solid #f0f0f0",display:"flex",gap:8}}>
          <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}} placeholder="Type a message…" style={{flex:1,padding:"8px 12px",borderRadius:20,border:"1px solid #e5e5e5",fontSize:13,outline:"none"}}/>
          <button onClick={sendMessage} style={{padding:"8px 16px",borderRadius:20,border:"none",background:"#534AB7",color:"#fff",fontSize:13,fontWeight:500,cursor:"pointer"}}>Send</button>
        </div>
      </div>

      <p style={{fontSize:11,color:"#bbb",textAlign:"center"}}>{USING_FIREBASE?"Live sync on":"Local mode"} · {today}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
